<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurroLink Login</title>
    <link rel="stylesheet" href="sign.css">
</head>
<body>

<div class="container">

    <!-- LEFT IMAGE SECTION -->
    <div class="left">
        <img src="Frame 8.png" alt="Family Image">
        <div class="overlay">
            <h3>Trusted Clinics Only ✔</h3>
            <p>
                Every clinic and legal expert on SurroLink is pre-vetted
                for safety, success rates, and ethical standards.
            </p>

            <div class="dots">
                <span class="active"></span>
                <span></span>
                <span></span>
            </div>

            <div class="nav-text">
                <span>Next</span>
                <span>Skip</span>
            </div>
        </div>
    </div>

    <!-- RIGHT FORM SECTION -->
    <div class="right">
        <div class="form-box">
            <h2>Welcome Back</h2>
            <p class="subtitle">
                Log in to access your saved clinics and roadmap.
            </p>

            <label>Email Address</label>
            <input type="email">

            <div class="password-row">
                <label>Password</label>
                <a href="#">Forgot password?</a>
            </div>

            <div class="password-input">
                <input type="password">
                <span class="eye">👁</span>
            </div>

            <button>Login</button>
        </div>
    </div>

</div>

</body>
</html>
